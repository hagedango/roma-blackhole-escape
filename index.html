<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ロマ子様のブラックホール・エスケープ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="stars-bg"></div>
<div id="game-container">

  <button id="btn-mute" class="glass-icon" title="サウンド ON/OFF">🔊</button>

  <!-- タイトル画面 -->
  <section id="screen-title" class="screen">
    <div class="glass-panel title-panel">
      <h1 class="game-title">ロマ子様の<br>ブラックホール・エスケープ</h1>
      <p class="subtitle">吸い込まれたら負けですわよ、ブタ野郎ども！</p>

      <div class="difficulty-select">
        <button id="btn-easy" class="difficulty-btn selected" data-level="easy">かんたん<br><span>EASY</span></button>
        <button id="btn-hard" class="difficulty-btn" data-level="hard">むずかしい<br><span>HARD</span></button>
      </div>

      <p class="howto">
        矢印キー / WASD でロマ子様を動かして、ブラックホールと隕石を避けよう！<br>
        スペースキーでダッシュ✨ スターのかけら⭐を集めるとボーナス！<br>
        <em>時間が経つほど隕石は速く、多くなりますわよ…！</em>
      </p>

      <button id="btn-start" class="main-btn">スタート</button>

      <div class="highscore-box glass-inline">
        <p>ハイスコア（EASY）：<span id="hs-easy">0</span></p>
        <p>ハイスコア（HARD）：<span id="hs-hard">0</span></p>
      </div>
    </div>
  </section>

  <!-- プレイ画面 -->
  <section id="screen-play" class="screen hidden">
    <div id="canvas-wrap">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="hud" class="glass-bar">
        <div id="hud-score">SCORE <span id="score-value">0</span></div>
        <div id="hud-time"><span id="time-value">0.0</span>s</div>
        <div id="hud-dash">
          <span class="dash-label">DASH</span>
          <div id="dash-gauge-outer"><div id="dash-gauge-inner"></div></div>
        </div>
      </div>
    </div>

    <!-- スマホ用コントロール -->
    <div id="touch-controls">
      <div id="dpad">
        <button class="dpad-btn" id="dpad-up" data-dir="up">▲</button>
        <button class="dpad-btn" id="dpad-left" data-dir="left">◀</button>
        <button class="dpad-btn" id="dpad-right" data-dir="right">▶</button>
        <button class="dpad-btn" id="dpad-down" data-dir="down">▼</button>
      </div>
      <button id="btn-dash-touch">DASH</button>
    </div>
  </section>

  <!-- ゲームオーバー画面 -->
  <section id="screen-gameover" class="screen hidden">
    <div class="glass-panel gameover-panel">
      <h2 class="gameover-title">GAME OVER</h2>
      <p id="gameover-quote" class="gameover-quote"></p>

      <div id="rank-badge">
        <span class="rank-label">称号</span>
        <span id="rank-name">---</span>
      </div>
      <p id="rank-message" class="rank-message"></p>

      <div class="result-box glass-inline">
        <p class="result-score">スコア：<span id="final-score">0</span></p>
        <p class="result-detail">生存 <span id="final-time">0</span>秒 ＋ かけら <span id="final-stars">0</span>個</p>
        <p id="new-record" class="new-record hidden">✨ New Record! ✨</p>
        <p class="result-highscore">ハイスコア：<span id="final-highscore">0</span></p>
      </div>

      <button id="btn-retry" class="main-btn">もう一度遊ぶ</button>
      <button id="btn-title" class="sub-btn">タイトルへ戻る</button>
    </div>
  </section>

</div>
<script src="game.js"></script>
</body>
</html>
